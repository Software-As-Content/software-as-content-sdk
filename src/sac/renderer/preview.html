<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19?dev",
      "react/": "https://esm.sh/react@19/",
      "react-dom": "https://esm.sh/react-dom@19?dev",
      "react-dom/": "https://esm.sh/react-dom@19/",
      "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
      "lucide-react": "https://esm.sh/lucide-react?external=react",
      "recharts": "https://esm.sh/recharts?external=react,react-dom",
      "pigeon-maps": "https://esm.sh/pigeon-maps?external=react",
      "pigeon-maps/": "https://esm.sh/pigeon-maps/&external=react"
    }
  }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { margin: 0; background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; background: #ffffff; }

    /* ─── Progressive evolve: change highlighting ───────────────────
     * Elements with data-sac-changed pulse orange. Clicking anywhere
     * dismisses (fade out). "Show Changes" button restores them.       */
    [data-sac-changed] {
      animation: sac-change-pulse 2s ease-in-out infinite;
      transition: box-shadow 0.4s ease-out;
    }
    .sac-highlights-hidden [data-sac-changed] {
      animation: none;
      box-shadow: none !important;
    }
    @keyframes sac-change-pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.25), 0 0 8px rgba(249, 115, 22, 0.08); }
      50%      { box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.6),  0 0 16px rgba(249, 115, 22, 0.2); }
    }

    /* ─── SaC action button hover cue ────────────────────────────────
     * Buttons whose onClick calls window.__sac_action get a
     * data-sac-action="true" attribute set by the shim at runtime.
     * On hover: orange outline + "✨ Ask Agent" pill slides up.
     * During streaming: buttons are faded + locked.                  */
    button[data-sac-action="true"] {
      position: relative;
    }
    button[data-sac-action="true"]::after {
      content: "✨ Ask Agent";
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: #0F2318;
      color: #ffffff;
      padding: 5px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: -0.01em;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18), 0 1px 0 rgba(255, 255, 255, 0.1) inset;
      z-index: 999;
      opacity: 0;
      transition: opacity 140ms ease, transform 140ms ease;
    }
    button[data-sac-action="true"]:hover {
      outline: 2px solid rgba(249, 115, 22, 0.55);
      outline-offset: 2px;
      transition: outline-color 120ms ease;
    }
    button[data-sac-action="true"]:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    /* ─── Streaming lock: disable sac-action buttons visually ──────── */
    body.sac-locked button[data-sac-action="true"] {
      opacity: 0.4;
      cursor: not-allowed;
    }
    body.sac-locked button[data-sac-action="true"]:hover {
      outline: none;
    }
    body.sac-locked button[data-sac-action="true"]:hover::after {
      display: none;
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#ffffff;">
      <div style="text-align:center;">
        <div style="width:32px;height:32px;margin:0 auto 16px;position:relative;">
          <div style="position:absolute;inset:0;border-radius:50%;border:1.5px solid #e7e5e4;animation:breathe-ring 3s ease-in-out infinite;"></div>
          <div style="position:absolute;inset:4px;border-radius:50%;border:1.5px solid transparent;border-top-color:#a8a29e;animation:spin 1.5s linear infinite;"></div>
        </div>
        <p style="color:#a8a29e;font-size:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:-0.01em;">Preparing canvas...</p>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes breathe-ring { 0%,100% { transform:scale(1);opacity:0.5; } 50% { transform:scale(1.08);opacity:1; } }
    </style>
  </div>

  <!-- SaC Action Bridge -->
  <script>
    window.__sac_action = function(intent, context) {
      if (typeof intent !== 'string' || !intent.trim()) return;
      window.parent.postMessage({
        type: 'sac-action',
        intent: intent.trim(),
        context: context && typeof context === 'object' ? context : null
      }, '*');
    };
  </script>

  <!-- Load Babel standalone -->
  <script>
    var _babelReady = false;
    var _pendingRender = null;

    var sc = document.createElement('script');
    sc.src = 'https://unpkg.com/@babel/standalone@7.26.10/babel.min.js';
    sc.onload = function() {
      _babelReady = true;
      if (_pendingRender) {
        renderApp(_pendingRender.code, _pendingRender.shimUrl, _pendingRender.silent);
        _pendingRender = null;
      }
    };
    sc.onerror = function() {
      window.parent.postMessage({ type: 'render-error', error: { message: 'Failed to load Babel', type: 'transpile' } }, '*');
    };
    document.head.appendChild(sc);
  </script>

  <!-- Bootstrap React once, then handle renders via postMessage -->
  <script type="module">
    import React from "react";
    import { useState, useEffect, useRef, useCallback, useMemo, useReducer, useContext, createContext, Fragment } from "react";
    import ReactDOM from "react-dom/client";

    window.__React = React;
    window.React = React;

    // Persistent React root — reused across renders (never unmounted).
    // onCaughtError: React 19 API — suppresses the default console.error
    // that React emits for errors caught by an ErrorBoundary. During
    // streaming, partial code routinely triggers runtime errors (e.g.
    // rendering an object as a child); these are caught by ErrorBoundary
    // and handled via last-good-frame fallback. Logging them is pure noise.
    const rootEl = document.getElementById('root');
    let _silentRenderActive = false;
    const reactRoot = ReactDOM.createRoot(rootEl, {
      onCaughtError(error) {
        if (_silentRenderActive) return;
        console.error(error);
      },
    });
    let _renderCounter = 0;

    // Auto-scroll to bottom during streaming
    let _streamingScrollActive = false;
    const _scrollObserver = new MutationObserver(() => {
      if (_streamingScrollActive) {
        window.scrollTo(0, document.documentElement.scrollHeight);
      }
    });
    _scrollObserver.observe(rootEl, { childList: true, subtree: true, characterData: true });

    // ─── Last-good-frame tracking ─────────────────────────────────────
    let _lastGoodCode = null;
    let _lastGoodShimUrl = null;

    window.__notifyRenderSuccess = function(code, shimUrl) {
      _lastGoodCode = code;
      _lastGoodShimUrl = shimUrl;
    };

    var _fallbackScheduled = false;
    window.__scheduleRenderLastGood = function() {
      if (!_lastGoodCode || !window.__scheduleSilentRender || _fallbackScheduled) return;
      _fallbackScheduled = true;
      requestAnimationFrame(function() {
        _fallbackScheduled = false;
        if (window._queuedRender || !_lastGoodCode || !window.__scheduleSilentRender) return;
        window.__scheduleSilentRender(_lastGoodCode, _lastGoodShimUrl);
      });
    };

    // Thin wrapper that fires a success notification after commit
    function SuccessWrapper({ code, shimUrl, children }) {
      useEffect(function() {
        window.__notifyRenderSuccess(code, shimUrl);
      }, []);
      return children;
    }

    // Error boundary with silent mode and resetKey
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { error: null, lastResetKey: props.resetKey };
      }
      static getDerivedStateFromProps(nextProps, prevState) {
        if (nextProps.resetKey !== prevState.lastResetKey) {
          return { error: null, lastResetKey: nextProps.resetKey };
        }
        return null;
      }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error) {
        if (!this.props.silent) {
          window.parent.postMessage({ type: 'render-error', error: { message: error.message, type: 'runtime', stack: error.stack || '' } }, '*');
        } else {
          requestAnimationFrame(function() {
            window.__scheduleRenderLastGood && window.__scheduleRenderLastGood();
          });
        }
      }
      render() {
        if (this.state.error) {
          if (this.props.silent) return null;
          return React.createElement('pre', {
            style: { padding: '24px', color: 'red', whiteSpace: 'pre-wrap' }
          }, 'Runtime error: ' + this.state.error.message);
        }
        return this.props.children;
      }
    }

    function renderErrorUI(message) {
      _renderCounter++;
      reactRoot.render(React.createElement('pre', {
        style: { padding: '24px', color: 'red', whiteSpace: 'pre-wrap' }
      }, message));
    }

    // ─── Partial TSX repair (for streaming chunks) ────────────────────
    const JSX_KEYWORDS = new Set(['return', 'yield', 'await', 'typeof', 'void', 'delete', 'new']);

    function repairPartialTsx(code) {
      let stripped = code.replace(/\s+$/, '');
      stripped = stripped.replace(/[.=+\-*/%&|^,:!?]+$/, '');
      stripped = stripped.replace(/\.\w*$/, '');

      const stack = [];
      let inString = null;
      let inLineComment = false;
      let inBlockComment = false;
      let i = 0;

      const lastNonWs = (upTo) => {
        let k = upTo - 1;
        while (k >= 0 && /\s/.test(stripped[k])) k--;
        return k >= 0 ? { char: stripped[k], idx: k } : null;
      };

      const isJsxContext = (idx) => {
        const prev = lastNonWs(idx);
        if (!prev) return true;
        if (/[({\[,;=&|?:!+\-*/%^~]/.test(prev.char)) return true;
        if (prev.char === '>') return true;
        if (/[A-Za-z0-9_$)\]]/.test(prev.char)) {
          let wEnd = prev.idx + 1;
          let wStart = prev.idx;
          while (wStart > 0 && /[A-Za-z0-9_$]/.test(stripped[wStart - 1])) wStart--;
          const word = stripped.slice(wStart, wEnd);
          return JSX_KEYWORDS.has(word);
        }
        return true;
      };

      while (i < stripped.length) {
        const c = stripped[i];
        const next = stripped[i + 1];

        if (inLineComment) {
          if (c === '\n') inLineComment = false;
          i++; continue;
        }
        if (inBlockComment) {
          if (c === '*' && next === '/') { inBlockComment = false; i += 2; continue; }
          i++; continue;
        }
        if (inString) {
          if (c === '\\') { i += 2; continue; }
          if (c === inString) inString = null;
          i++; continue;
        }

        if (c === '/' && next === '/') { inLineComment = true; i += 2; continue; }
        if (c === '/' && next === '*') { inBlockComment = true; i += 2; continue; }
        if (c === '"' || c === "'" || c === '`') { inString = c; i++; continue; }

        if (c === '(') { stack.push({ close: ')' }); i++; continue; }
        if (c === '{') { stack.push({ close: '}' }); i++; continue; }
        if (c === '[') { stack.push({ close: ']' }); i++; continue; }
        if (c === ')' || c === '}' || c === ']') {
          for (let k = stack.length - 1; k >= 0; k--) {
            if (stack[k].close === c) { stack.splice(k, 1); break; }
          }
          i++; continue;
        }

        if (c === '<') {
          if (next === '/') {
            let j = i + 2;
            if (stripped[j] === '>') {
              for (let k = stack.length - 1; k >= 0; k--) {
                if (stack[k].close === '</>') { stack.splice(k, 1); break; }
              }
              i = j + 1; continue;
            }
            while (j < stripped.length && /[A-Za-z0-9_.]/.test(stripped[j])) j++;
            const tagName = stripped.slice(i + 2, j);
            while (j < stripped.length && stripped[j] !== '>') j++;
            if (j >= stripped.length) {
              return repairPartialTsx(stripped.slice(0, i));
            }
            const closeStr = `</${tagName}>`;
            for (let k = stack.length - 1; k >= 0; k--) {
              if (stack[k].close === closeStr) { stack.splice(k, 1); break; }
            }
            i = j + 1; continue;
          }
          if (next === '>') {
            stack.push({ close: '</>' });
            i += 2; continue;
          }
          const topIsJsx = stack.length > 0 && stack[stack.length - 1].close.startsWith('</');
          if (/[A-Za-z]/.test(next) && (topIsJsx || isJsxContext(i))) {
            let j = i + 1;
            while (j < stripped.length && /[A-Za-z0-9_.]/.test(stripped[j])) j++;
            const tagName = stripped.slice(i + 1, j);

            let depth = 0;
            let attrStr = null;
            let k = j;
            let completed = false;
            let selfClosing = false;
            while (k < stripped.length) {
              const cc = stripped[k];
              const nn = stripped[k + 1];
              if (attrStr) {
                if (cc === '\\') { k += 2; continue; }
                if (cc === attrStr) attrStr = null;
                k++; continue;
              }
              if (cc === '"' || cc === "'") { attrStr = cc; k++; continue; }
              if (cc === '{') { depth++; k++; continue; }
              if (cc === '}') { depth--; k++; continue; }
              if (depth === 0 && cc === '/' && nn === '>') { selfClosing = true; completed = true; k += 2; break; }
              if (depth === 0 && cc === '>') { completed = true; k++; break; }
              k++;
            }
            if (!completed) {
              let synthTail = '';
              if (attrStr) synthTail += attrStr;
              while (depth > 0) { synthTail += '}'; depth--; }
              synthTail += ' />';
              const rebuilt = stripped.slice(0, k) + synthTail;
              return repairPartialTsx(rebuilt);
            }
            if (!selfClosing) stack.push({ close: `</${tagName}>` });
            i = k;
            continue;
          }
          i++;
          continue;
        }

        i++;
      }

      let suffix = '';
      if (inString) suffix += inString;
      if (inBlockComment) suffix += '*/';
      while (stack.length > 0) {
        suffix += stack.pop().close;
      }

      return stripped + suffix;
    }

    // ─── Lucide icon safety net ───────────────────────────────────────
    function rewriteLucideImports(code) {
      let count = 0;
      let hadLucide = false;
      const rewritten = code.replace(
        /import\s*\{([^}]*)\}\s*from\s*["']lucide-react["']\s*;?/g,
        (_match, names) => {
          hadLucide = true;
          count++;
          const ns = `__sac_lucide_${count}`;
          const decls = names.split(',').map(s => s.trim()).filter(Boolean).map(item => {
            const m = item.match(/^([A-Za-z_$][\w$]*)(?:\s+as\s+([A-Za-z_$][\w$]*))?$/);
            if (!m) return '';
            const orig = m[1];
            const alias = m[2] || m[1];
            return `const ${alias} = ${ns}.${orig} || __sac_lucide_fallback;`;
          }).filter(Boolean).join('\n');
          return `import * as ${ns} from "lucide-react";\n${decls}`;
        }
      );
      if (!hadLucide) return code;
      const fallback = `const __sac_lucide_fallback = (props) => React.createElement('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round', ...props }, React.createElement('circle', { cx: 12, cy: 12, r: 10 }));\n`;
      return fallback + rewritten;
    }

    // Cache for shim blob URLs
    const shimCache = {};

    window.__clearRoot = function() {
      _renderCounter++;
      _lastGoodCode = null;
      _lastGoodShimUrl = null;
      reactRoot.render(
        React.createElement('div', {
          style: { minHeight: '100vh', background: '#ffffff' },
        })
      );
    };

    // Main render function
    window.__doRender = async function(tsxCode, shimUrl, silent, generation) {
      if (!window.Babel) {
        if (!silent) window.parent.postMessage({ type: 'render-error', error: { message: 'Babel not loaded', type: 'transpile' } }, '*');
        return;
      }

      // Escape URL template variables like /{id} → /{'{id}'} to prevent
      // "id is not defined" runtime errors from bare JSX text expressions.
      // First protect already-escaped {'...'} / {"..."} expressions, then fix, then restore.
      var _protected = [];
      tsxCode = tsxCode.replace(/\{(?:'[^']*'|"[^"]*")\}/g, function(m) {
        _protected.push(m);
        return '__SAC_P' + (_protected.length - 1) + '__';
      });
      tsxCode = tsxCode.replace(/\/\{([a-zA-Z_]\w*)\}(?=[ /)<,.'"])/g, "/{'{$1}'}");
      tsxCode = tsxCode.replace(/__SAC_P(\d+)__/g, function(_, i) { return _protected[parseInt(i)]; });

      if (!silent) console.log('[SaC] render start, code length:', tsxCode.length);

      let jsCode;
      try {
        jsCode = window.Babel.transform(tsxCode, {
          presets: ['react', 'typescript'],
          filename: 'App.tsx',
        }).code;
        if (!silent) console.log('[SaC] babel OK, js length:', jsCode.length);
      } catch(e) {
        if (!silent) {
          console.error('[SaC] babel FAIL:', e.message);
          window.parent.postMessage({ type: 'render-error', error: { message: e.message, type: 'transpile' } }, '*');
          renderErrorUI('Transpile error: ' + e.message);
          return;
        }
        // Silent (streaming) path: try to repair partial TSX
        const repaired = repairPartialTsx(tsxCode);
        if (repaired === tsxCode) return;
        // Guard: skip frames with no visible JSX before first good frame
        if (!_lastGoodCode && !/<[A-Za-z][^>]*>[^<]*[^<\s][^<]*/.test(repaired)) return;
        try {
          jsCode = window.Babel.transform(repaired, {
            presets: ['react', 'typescript'],
            filename: 'App.tsx',
          }).code;
        } catch {
          return;
        }
      }

      // Load and cache shim
      if (shimUrl) {
        if (!shimCache[shimUrl]) {
          try {
            const res = await fetch(shimUrl);
            const shimCode = await res.text();
            shimCache[shimUrl] = URL.createObjectURL(new Blob([shimCode], { type: 'application/javascript' }));
          } catch(e) {
            if (!silent) window.parent.postMessage({ type: 'render-error', error: { message: 'Failed to load design system', type: 'module-load' } }, '*');
            return;
          }
        }
        jsCode = jsCode.replace(/__ui_shim__/g, shimCache[shimUrl]);
      }

      // Rewrite lucide imports with fallback
      jsCode = rewriteLucideImports(jsCode);
      if (!silent) console.log('[SaC] imports rewritten');

      // Dynamic import the app code
      let appBlob;
      try {
        appBlob = URL.createObjectURL(new Blob([jsCode], { type: 'application/javascript' }));
        if (!silent) console.log('[SaC] importing module blob...');
        const mod = await import(appBlob);
        URL.revokeObjectURL(appBlob);
        if (!silent) console.log('[SaC] module loaded, exports:', Object.keys(mod));

        const App = mod.default || Object.values(mod).find(v => typeof v === 'function');
        if (!App) {
          if (!silent) {
            console.error('[SaC] no default export found');
            window.parent.postMessage({ type: 'render-error', error: { message: 'No default export found', type: 'module-load' } }, '*');
          }
          return;
        }
        if (!silent) console.log('[SaC] App component:', App.name || '(anonymous)');

        _renderCounter++;
        const appEl = silent
          ? React.createElement(SuccessWrapper, { code: tsxCode, shimUrl: shimUrl }, React.createElement(App))
          : React.createElement(App);
        const boundary = React.createElement(
          ErrorBoundary,
          { silent: !!silent, resetKey: _renderCounter },
          appEl
        );

        if (generation !== undefined && generation !== window._renderGeneration) return;

        _streamingScrollActive = !!silent;
        _silentRenderActive = !!silent;
        if (!silent) console.log('[SaC] calling reactRoot.render...');
        reactRoot.render(boundary);

        if (!silent) {
          // Intercept React 19 DOM nesting warnings (console.error) that
          // bypass ErrorBoundary. These corrupt the DOM silently — detect
          // and report them so the parent can show the error notice.
          var _domNestingDetected = null;
          var _prevConsoleError = console.error;
          console.error = function() {
            var msg = Array.prototype.join.call(arguments, ' ');
            if (/cannot be a child of|validateDOMNesting/i.test(msg) && !_domNestingDetected) {
              _domNestingDetected = msg.slice(0, 200);
            }
            _prevConsoleError.apply(console, arguments);
          };
          // Check after React commits: if nesting error was detected,
          // report it instead of success. Also check for blank render.
          requestAnimationFrame(function() {
            console.error = _prevConsoleError;
            if (_domNestingDetected) {
              window.parent.postMessage({ type: 'render-error', error: { message: _domNestingDetected, type: 'runtime' } }, '*');
              return;
            }
            // Blank-render detection: if the root has no visible content
            // after React commits, something went wrong silently.
            var rootText = (rootEl.textContent || '').trim();
            var rootChildren = rootEl.querySelectorAll('*').length;
            console.log('[SaC] post-render check: children=' + rootChildren + ', textLen=' + rootText.length);
            if (rootChildren < 2 && rootText.length === 0) {
              console.warn('[SaC] BLANK RENDER detected — DOM is empty after commit');
              // Schedule a second check after React concurrent flush
              setTimeout(function() {
                var t2 = (rootEl.textContent || '').trim();
                var c2 = rootEl.querySelectorAll('*').length;
                console.log('[SaC] deferred check: children=' + c2 + ', textLen=' + t2.length);
                if (c2 < 2 && t2.length === 0) {
                  console.error('[SaC] CONFIRMED blank render');
                  window.parent.postMessage({ type: 'render-error', error: { message: 'Component rendered but produced no visible output', type: 'runtime' } }, '*');
                }
              }, 300);
            }
          });

          window.parent.postMessage({ type: 'render-success' }, '*');
          // Report change count so parent can show/hide "Show Changes" button.
          // React 19 concurrent mode: render() doesn't guarantee synchronous
          // commit, so rAF may fire before the DOM updates. Use a MutationObserver
          // to wait for the actual commit, with a timeout fallback.
          var _countReported = false;
          function _reportChangeCount() {
            if (_countReported) return;
            _countReported = true;
            var count = rootEl.querySelectorAll('[data-sac-changed]').length;
            window.parent.postMessage({ type: 'sac-change-count', count: count }, '*');
          }
          var _commitObserver = new MutationObserver(function() {
            _commitObserver.disconnect();
            // One more rAF to ensure paint is complete
            requestAnimationFrame(_reportChangeCount);
          });
          _commitObserver.observe(rootEl, { childList: true, subtree: true });
          // Fallback: if no DOM mutation within 500ms (e.g. re-render with
          // same structure), report anyway.
          setTimeout(function() {
            _commitObserver.disconnect();
            _reportChangeCount();
          }, 500);
        }
      } catch(err) {
        if (appBlob) URL.revokeObjectURL(appBlob);
        if (!silent) {
          console.error('[SaC] module/render CATCH:', err.message, err.stack);
          window.parent.postMessage({ type: 'render-error', error: { message: err.message, type: 'module-load', stack: err.stack || '' } }, '*');
          renderErrorUI(err.message);
        }
      }
    };

    // Pre-warm lightweight libraries
    ['pigeon-maps', 'lucide-react'].forEach(function(m) {
      import(m).catch(function() {});
    });

    // Signal module ready
    window.__moduleReady = true;
    if (window.__pendingModuleRender) {
      const p = window.__pendingModuleRender;
      window.__doRender(p.code, p.shimUrl, p.silent);
    }
  </script>

  <!-- Click lock -->
  <script>
    var _sacLocked = false;
    function _sacBlockEvent(ev) {
      if (!ev.target || !ev.target.closest('[data-sac-action]')) return;
      ev.preventDefault();
      ev.stopImmediatePropagation();
    }
    var _SAC_LOCK_EVENTS = ['click', 'mousedown', 'pointerdown', 'contextmenu', 'dblclick', 'auxclick'];
    function _sacSetLocked(locked) {
      locked = !!locked;
      if (locked === _sacLocked) return;
      _sacLocked = locked;
      document.body.classList.toggle('sac-locked', locked);
      for (var i = 0; i < _SAC_LOCK_EVENTS.length; i++) {
        var t = _SAC_LOCK_EVENTS[i];
        if (locked) {
          window.addEventListener(t, _sacBlockEvent, true);
        } else {
          window.removeEventListener(t, _sacBlockEvent, true);
        }
      }
    }
  </script>

  <!-- Message handler + render scheduler (non-module, runs immediately) -->
  <script>
    // ─── Console muting for streaming ─────────────────────────────────
    // During streaming, partial code inevitably triggers React warnings
    // (DOM nesting, className="true") and runtime errors caught by
    // ErrorBoundary ("X is not defined", "Objects are not valid as React
    // child"). These are all expected and handled by the last-good-frame
    // mechanism. We mute console for the ENTIRE streaming session rather
    // than per-render (React 19 concurrent mode defers render work past
    // any per-frame restore timer). Console is restored on final render
    // or abort so real errors surface normally.
    var _origConsoleError = console.error;
    var _origConsoleWarn = console.warn;
    var _consoleMuted = false;

    function _muteConsole() {
      if (_consoleMuted) return;
      _consoleMuted = true;
      console.error = function(){};
      console.warn = function(){};
    }

    function _restoreConsole() {
      if (!_consoleMuted) return;
      _consoleMuted = false;
      console.error = _origConsoleError;
      console.warn = _origConsoleWarn;
    }

    // Stream render scheduler (latest-wins + in-flight serialization)
    var _STREAM_MIN_INTERVAL_MS = 280;
    var _STREAM_STALE_MS = 1500;
    var _lastRenderStartedAt = 0;
    var _renderInFlight = false;
    var _renderGeneration = 0;
    var _staleTimer = null;
    var _renderTimer = null;
    var _queuedRender = null;

    function _drainRenderQueue() {
      if (_renderInFlight || !_queuedRender) return;

      var req = _queuedRender;
      var now = Date.now();

      if (req.silent) {
        var wait = _STREAM_MIN_INTERVAL_MS - (now - _lastRenderStartedAt);
        if (wait > 0) {
          if (_renderTimer) clearTimeout(_renderTimer);
          _renderTimer = setTimeout(function() {
            _renderTimer = null;
            _drainRenderQueue();
          }, wait);
          return;
        }
      }

      _queuedRender = null;
      _renderInFlight = true;
      _lastRenderStartedAt = Date.now();
      var myGen = ++_renderGeneration;

      if (req.silent) {
        if (_staleTimer) clearTimeout(_staleTimer);
        _staleTimer = setTimeout(function() {
          _staleTimer = null;
          if (_renderInFlight) {
            _renderInFlight = false;
            _drainRenderQueue();
          }
        }, _STREAM_STALE_MS);
      }

      Promise.resolve(window.__doRender(req.code, req.shimUrl, req.silent, myGen))
        .then(function() {
          if (req.scrollToChange) {
            requestAnimationFrame(function() {
              var els = document.querySelectorAll('[data-sac-changed]');
              if (els.length) _activateTabAndScroll(els[els.length - 1]);
            });
          }
        })
        .catch(function() {})
        .finally(function() {
          if (_staleTimer) { clearTimeout(_staleTimer); _staleTimer = null; }
          _renderInFlight = false;
          _drainRenderQueue();
        });
    }

    function _scheduleRender(code, shimUrl, silent, scrollToChange) {
      _queuedRender = { code: code, shimUrl: shimUrl, silent: !!silent, scrollToChange: !!scrollToChange };

      // Mute console on first silent render; restore on final (non-silent).
      if (silent) {
        _muteConsole();
      } else {
        _restoreConsole();
      }

      if (!silent && _renderTimer) {
        clearTimeout(_renderTimer);
        _renderTimer = null;
      }
      _drainRenderQueue();
    }

    var _TOOLBAR_HEIGHT = 50;

    function _activateTabAndScroll(el) {
      var node = el;
      while (node) {
        if (node.getAttribute && node.getAttribute('data-tab-value') &&
            node.getAttribute('data-state') === 'inactive') {
          var tabValue = node.getAttribute('data-tab-value');
          var container = node.parentElement;
          if (container) {
            var trigger = container.querySelector('[role="tab"][data-tab-value="' + tabValue + '"]');
            if (trigger) trigger.click();
          }
          break;
        }
        node = node.parentElement;
      }
      requestAnimationFrame(function() {
        var rect = el.getBoundingClientRect();
        var target = window.scrollY + rect.top - _TOOLBAR_HEIGHT - (window.innerHeight - _TOOLBAR_HEIGHT) / 2;
        window.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
      });
    }

    window.__scheduleSilentRender = function(code, shimUrl) {
      _scheduleRender(code, shimUrl, true);
    };

    window.addEventListener('message', function(ev) {
      if (!ev.data || !ev.data.type) return;

      if (ev.data.type === 'render') {
        renderApp(ev.data.code, ev.data.shimUrl, !!ev.data.silent, !!ev.data.scrollToChange);
      } else if (ev.data.type === 'abort') {
        _restoreConsole();
        document.getElementById('root').innerHTML = '';
      } else if (ev.data.type === 'clear') {
        _restoreConsole();
        if (window.__clearRoot) window.__clearRoot();
      } else if (ev.data.type === 'set-locked') {
        _sacSetLocked(!!ev.data.locked);
      } else if (ev.data.type === 'scroll-to-change') {
        // Re-show highlights + scroll to target
        document.documentElement.classList.remove('sac-highlights-hidden');
        window.parent.postMessage({ type: 'sac-highlights-visible', visible: true }, '*');
        var els = document.querySelectorAll('[data-sac-changed]');
        if (els.length > 0) {
          var idx = (ev.data.index || 0) % els.length;
          _activateTabAndScroll(els[idx]);
        }
      }
    });

    // Click anywhere in the app to dismiss highlights
    document.addEventListener('click', function() {
      if (document.documentElement.classList.contains('sac-highlights-hidden')) return;
      if (!document.querySelector('[data-sac-changed]')) return;
      document.documentElement.classList.add('sac-highlights-hidden');
      window.parent.postMessage({ type: 'sac-highlights-visible', visible: false }, '*');
    });

    function renderApp(code, shimUrl, silent, scrollToChange) {
      if (!_babelReady) {
        _pendingRender = { code: code, shimUrl: shimUrl, silent: silent, scrollToChange: scrollToChange };
        return;
      }
      if (window.__moduleReady && window.__doRender) {
        _scheduleRender(code, shimUrl, silent, scrollToChange);
      } else {
        window.__pendingModuleRender = { code: code, shimUrl: shimUrl, silent: silent, scrollToChange: scrollToChange };
      }
    }
  </script>
</body>
</html>
