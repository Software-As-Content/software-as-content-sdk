<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19?dev",
      "react/": "https://esm.sh/react@19/",
      "react-dom": "https://esm.sh/react-dom@19?dev",
      "react-dom/": "https://esm.sh/react-dom@19/",
      "react-dom/client": "https://esm.sh/react-dom@19/client?dev",
      "lucide-react": "https://esm.sh/lucide-react?external=react",
      "recharts": "https://esm.sh/recharts?external=react,react-dom",
      "pigeon-maps": "https://esm.sh/pigeon-maps?external=react",
      "pigeon-maps/": "https://esm.sh/pigeon-maps/&external=react"
    }
  }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"><p style="padding:24px;color:#a8a29e;">Waiting for code...</p></div>

  <script>
    var _babelReady = false;
    var _pendingRender = null;
    var _reactRoot = null;

    // Load Babel
    var sc = document.createElement('script');
    sc.src = 'https://unpkg.com/@babel/standalone@7.26.10/babel.min.js';
    sc.onload = function() {
      _babelReady = true;
      if (_pendingRender) {
        renderApp(_pendingRender.code, _pendingRender.shimUrl);
        _pendingRender = null;
      }
    };
    sc.onerror = function() {
      postError('Failed to load Babel transpiler', 'transpile');
    };
    document.head.appendChild(sc);

    // Listen for messages from parent
    window.addEventListener('message', function(ev) {
      if (!ev.data || !ev.data.type) return;

      if (ev.data.type === 'render') {
        if (_babelReady) {
          renderApp(ev.data.code, ev.data.shimUrl);
        } else {
          _pendingRender = { code: ev.data.code, shimUrl: ev.data.shimUrl };
        }
      } else if (ev.data.type === 'abort') {
        document.getElementById('root').innerHTML = '';
      }
    });

    function postError(message, type, stack) {
      window.parent.postMessage({ type: 'render-error', error: { message: message, type: type, stack: stack || '' } }, '*');
    }

    function postSuccess() {
      window.parent.postMessage({ type: 'render-success' }, '*');
    }

    // Cache fetched shim blob URLs
    var _shimBlobCache = {};

    async function renderApp(tsxCode, shimUrl) {
      // Transpile TSX -> JS using Babel
      var jsCode;
      try {
        jsCode = window.Babel.transform(tsxCode, {
          presets: ['react', 'typescript'],
          filename: 'App.tsx',
        }).code;
      } catch(e) {
        window.parent.postMessage({ type: 'render-error', error: { message: e.message, type: 'transpile' } }, '*');
        document.getElementById('root').innerHTML = '<pre style="padding:24px;color:red;white-space:pre-wrap;">Transpile error: ' + e.message + '</pre>';
        return;
      }

      // Fetch shim and create blob URL (cached)
      if (shimUrl) {
        if (!_shimBlobCache[shimUrl]) {
          try {
            var res = await fetch(shimUrl);
            var shimCode = await res.text();
            _shimBlobCache[shimUrl] = URL.createObjectURL(new Blob([shimCode], { type: 'application/javascript' }));
          } catch(e) {
            window.parent.postMessage({ type: 'render-error', error: { message: 'Failed to load design system: ' + e.message, type: 'module-load' } }, '*');
            return;
          }
        }
        jsCode = jsCode.replace(/__ui_shim__/g, _shimBlobCache[shimUrl]);
      }

      // Create app module blob
      var appBlob = URL.createObjectURL(new Blob([jsCode], { type: 'application/javascript' }));

      // Entry module imports React, then dynamically imports the app blob
      var entryCode =
        'import React from "react";\n' +
        'import { useState, useEffect, useRef, useCallback, useMemo, useReducer, useContext, createContext, Fragment } from "react";\n' +
        'import ReactDOM from "react-dom/client";\n' +
        'window.__React = React;\n' +
        'window.React = React;\n' +
        'class ErrorBoundary extends React.Component {\n' +
        '  constructor(props) { super(props); this.state = { error: null }; }\n' +
        '  static getDerivedStateFromError(error) { return { error }; }\n' +
        '  componentDidCatch(error) {\n' +
        '    window.parent.postMessage({ type: "render-error", error: { message: error.message, type: "runtime", stack: error.stack || "" } }, "*");\n' +
        '  }\n' +
        '  render() {\n' +
        '    if (this.state.error) return React.createElement("pre", { style: { padding: "24px", color: "red", whiteSpace: "pre-wrap" } }, "Runtime error: " + this.state.error.message);\n' +
        '    return this.props.children;\n' +
        '  }\n' +
        '}\n' +
        '(async () => {\n' +
        '  try {\n' +
        '    const mod = await import("' + appBlob + '");\n' +
        '    const App = mod.default || Object.values(mod).find(v => typeof v === "function");\n' +
        '    if (!App) { window.parent.postMessage({ type: "render-error", error: { message: "No default export found", type: "module-load" } }, "*"); return; }\n' +
        '    const root = document.getElementById("root");\n' +
        '    root.innerHTML = "";\n' +
        '    ReactDOM.createRoot(root).render(React.createElement(ErrorBoundary, null, React.createElement(App)));\n' +
        '    window.parent.postMessage({ type: "render-success" }, "*");\n' +
        '  } catch(err) {\n' +
        '    window.parent.postMessage({ type: "render-error", error: { message: err.message, type: "module-load", stack: err.stack || "" } }, "*");\n' +
        '    document.getElementById("root").innerHTML = "<pre style=\\"padding:24px;color:red;white-space:pre-wrap;\\">" + err.message + "</pre>";\n' +
        '  }\n' +
        '})();\n';

      var entryBlob = URL.createObjectURL(new Blob([entryCode], { type: 'application/javascript' }));
      var ms = document.createElement('script');
      ms.type = 'module';
      ms.src = entryBlob;
      document.body.appendChild(ms);
    }
  </script>
</body>
</html>
