<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaC SDK Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f4; color: #1c1917; }
  .header { padding: 16px 24px; background: #fff; border-bottom: 1px solid #e7e5e4; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .version { font-size: 12px; color: #78716c; background: #f5f5f4; padding: 2px 8px; border-radius: 4px; }
  .main { display: flex; height: calc(100vh - 57px); }
  .sidebar { width: 400px; min-width: 400px; background: #fff; border-right: 1px solid #e7e5e4; display: flex; flex-direction: column; }
  .input-area { padding: 16px; border-bottom: 1px solid #e7e5e4; }
  .input-area textarea { width: 100%; height: 80px; border: 1px solid #e7e5e4; border-radius: 8px; padding: 12px; font-size: 14px; resize: vertical; font-family: inherit; }
  .input-area textarea:focus { outline: none; border-color: #f97316; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #f97316; color: #fff; }
  .btn-primary:hover { background: #ea580c; }
  .btn-primary:disabled { background: #d6d3d1; cursor: not-allowed; }
  .btn-secondary { background: #f5f5f4; color: #44403c; border: 1px solid #e7e5e4; }
  .btn-secondary:hover { background: #e7e5e4; }
  .status { padding: 16px; border-bottom: 1px solid #e7e5e4; font-size: 13px; color: #78716c; }
  .suggestions { padding: 16px; border-bottom: 1px solid #e7e5e4; }
  .suggestions h3 { font-size: 13px; font-weight: 500; color: #78716c; margin-bottom: 8px; }
  .suggestion-btn { display: block; width: 100%; text-align: left; padding: 8px 12px; margin-bottom: 4px; background: #fef3c7; border: 1px solid #fde68a; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .suggestion-btn:hover { background: #fde68a; }
  .code-area { flex: 1; overflow: auto; }
  .code-area pre { padding: 16px; font-size: 12px; line-height: 1.5; font-family: 'SF Mono', 'Fira Code', monospace; white-space: pre-wrap; word-break: break-all; }
  .preview-area { flex: 1; background: #fff; }
  .preview-area iframe { width: 100%; height: 100%; border: none; }
  .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #78716c; font-size: 15px; }
  .tab-bar { display: flex; border-bottom: 1px solid #e7e5e4; background: #fafaf9; }
  .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: #78716c; }
  .tab.active { color: #f97316; border-bottom-color: #f97316; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>SaC SDK</h1>
  <span class="version">v0.1.0</span>
  <span id="conv-info" style="margin-left:auto; font-size:12px; color:#a8a29e;"></span>
</div>

<div class="main">
  <div class="sidebar">
    <div class="input-area">
      <textarea id="intent" placeholder="Describe the UI you want to generate..."></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" id="gen-btn">Generate</button>
        <button class="btn btn-secondary hidden" id="evolve-btn">Evolve</button>
      </div>
    </div>
    <div class="status hidden" id="status-bar"></div>
    <div class="suggestions hidden" id="suggestions-area">
      <h3>Suggestions</h3>
      <div id="suggestions-list"></div>
    </div>
    <div class="tab-bar">
      <div class="tab active">Code</div>
    </div>
    <div class="code-area" id="code-panel">
      <pre id="code-display" style="color:#78716c;">Generate something to see the code here.</pre>
    </div>
  </div>

  <div class="preview-area">
    <div class="loading" id="placeholder">Enter an intent and click Generate</div>
    <iframe id="preview" class="hidden"></iframe>
  </div>
</div>

<!-- Load Babel in parent for streaming transpile checks -->
<script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>

<script type="module">
import { SaCRenderer } from '/renderer/sac-renderer.js';

console.log('[SaC] Module loaded');
window.__sacModuleLoaded = true;

// ─── Renderer setup ───────────────────────────────────────────

const iframe = document.getElementById('preview');
const placeholder = document.getElementById('placeholder');
const renderer = new SaCRenderer(iframe);

renderer.on('render', () => {
  placeholder.classList.add('hidden');
  iframe.classList.remove('hidden');
});

renderer.on('error', (err) => {
  showStatus(`Render error (${err.type}): ${err.message}`);
});

// ─── State ────────────────────────────────────────────────────

let conversationId = null;
let currentVersion = 0;

// ─── Button handlers ──────────────────────────────────────────

document.getElementById('gen-btn').addEventListener('click', async () => {
  const intent = document.getElementById('intent').value.trim();
  if (!intent) return;

  let url = '/stream?intent=' + encodeURIComponent(intent);
  if (conversationId) url += '&conversation_id=' + encodeURIComponent(conversationId);
  await streamGenerate(url);
});

document.getElementById('evolve-btn').addEventListener('click', async () => {
  const intent = document.getElementById('intent').value.trim();
  if (!intent || !conversationId) return;

  await streamGenerate(
    '/stream?intent=' + encodeURIComponent(intent) +
    '&conversation_id=' + encodeURIComponent(conversationId)
  );
});

// ─── Streaming generation ─────────────────────────────────────

async function streamGenerate(url) {
  const btn = document.getElementById('gen-btn');
  const evolveBtn = document.getElementById('evolve-btn');
  btn.disabled = true;
  evolveBtn.disabled = true;
  showStatus('Generating...');

  // Clear code display and prepare for streaming
  const codeDisplay = document.getElementById('code-display');
  codeDisplay.textContent = '';
  codeDisplay.style.color = '';

  // Prepare iframe
  placeholder.classList.add('hidden');
  iframe.classList.remove('hidden');

  const stream = renderer.createStream();
  const es = new EventSource(url);

  function done() {
    btn.disabled = false;
    evolveBtn.disabled = false;
  }

  es.addEventListener('stage', (e) => {
    const event = JSON.parse(e.data);
    showStatus(`${event.name}: ${event.status}`);
  });

  es.addEventListener('chunk', (e) => {
    const event = JSON.parse(e.data);
    codeDisplay.textContent += event.data;
    stream.push(event.data);
  });

  es.addEventListener('complete', (e) => {
    const event = JSON.parse(e.data);
    stream.end();
    es.close();

    const app = event.app;
    if (event.conversation_id) conversationId = event.conversation_id;
    currentVersion = app.version;

    document.getElementById('conv-info').textContent =
      `v${currentVersion} | ${app.code.length} chars`;

    evolveBtn.classList.remove('hidden');
    document.getElementById('intent').value = '';

    // Show suggestions
    const suggestions = app.suggestions || [];
    if (suggestions.length > 0) {
      const area = document.getElementById('suggestions-area');
      const list = document.getElementById('suggestions-list');
      area.classList.remove('hidden');
      list.innerHTML = suggestions.map(s =>
        `<button class="suggestion-btn" data-prompt="${escHtml(s.prompt)}">${escHtml(s.label)}</button>`
      ).join('');
      list.querySelectorAll('.suggestion-btn').forEach(b => {
        b.addEventListener('click', () => {
          document.getElementById('intent').value = b.dataset.prompt;
        });
      });
    }

    const stages = (app.stages || []).map(s => `${s.name}: ${s.status}`).join(' -> ');
    showStatus(`v${currentVersion} | ${app.code.length} chars | ${stages}`);
    done();
  });

  es.addEventListener('error', (e) => {
    // SSE 'error' event can be either a typed event from server or a connection error
    try {
      const event = JSON.parse(e.data);
      showStatus('Error: ' + event.error);
    } catch {
      showStatus('Connection error');
    }
    stream.abort();
    es.close();
    done();
  });
}

// ─── Helpers ──────────────────────────────────────────────────

function showStatus(text) {
  const bar = document.getElementById('status-bar');
  bar.classList.remove('hidden');
  bar.innerHTML = text;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
