<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaC SDK Preview</title>
<link rel="stylesheet" href="/static/index.css">
</head>
<body>

<div class="header">
  <button class="sidebar-toggle" id="sidebar-toggle" type="button" title="Toggle sidebar">☰</button>
  <h1>SaC SDK</h1>
  <div style="flex:1"></div>
  <button class="changes-btn hidden" id="show-changes-btn" type="button">Show Changes</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="tab-bar">
      <div class="tab active" data-tab="chat">Activity</div>
      <div class="tab" data-tab="conversations">History</div>
    </div>

    <!-- Activity tab -->
    <div class="tab-content" id="tab-chat" style="display:flex;flex-direction:column;">
      <div class="chat-area" id="chat-area">
        <div class="chat-msg system">
          <div class="chat-bubble">Send a message to start.</div>
        </div>
      </div>
      <div class="status hidden" id="status-bar"></div>
      <div class="suggestions hidden" id="suggestions-area">
        <span class="suggestions-label">Next actions</span>
        <div id="suggestions-list"></div>
      </div>
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="intent" placeholder="What's next?" rows="1"></textarea>
          <button class="send-btn-inline" id="send-btn" type="button" title="Send">↑</button>
        </div>
      </div>
    </div>

    <!-- History tab -->
    <div class="tab-content hidden" id="tab-conversations">
      <div class="api-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <h3 style="font-size:14px;font-weight:600;">Conversations</h3>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-secondary btn-sm" id="new-conv-btn" title="New conversation">+ New</button>
            <button class="btn btn-secondary btn-sm" onclick="loadConversations()">Refresh</button>
          </div>
        </div>
        <div id="conv-list"><p style="font-size:13px;color:#a8a29e;">Click Refresh to load</p></div>
      </div>
    </div>
  </div>

  <div class="preview-area">
    <div class="preview-tabs" id="preview-tabs">
      <div class="preview-tab active" data-ptab="app">App</div>
      <div class="preview-tab" data-ptab="code">Code</div>
    </div>
    <div class="loading" id="placeholder">
      <span style="font-size:32px;">✦</span>
      <span>The generated app appears here</span>
    </div>
    <div class="preview-notice hidden" id="preview-notice"></div>
    <iframe id="preview" class="hidden"></iframe>
    <div class="preview-code-panel hidden" id="preview-code-panel">
      <div class="code-toolbar">
        <div>
          <div class="code-toolbar-title">Generated code</div>
          <div class="code-toolbar-meta" id="code-meta">No app version selected</div>
        </div>
        <div class="code-toolbar-actions">
          <button class="btn btn-secondary btn-sm" id="copy-code-btn" type="button">Copy</button>
        </div>
      </div>
      <pre id="code-display" class="code-display">Generate something to see the code here.</pre>
    </div>
  </div>
</div>

<!-- Load Babel in parent for streaming transpile checks -->
<script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>

<script type="module" src="/static/index.js"></script>
</body>
</html>
